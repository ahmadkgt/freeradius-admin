# Host-level nginx reverse proxy for the FreeRADIUS admin panel.
#
# Save as /etc/nginx/sites-available/freeradius-admin, symlink it into
# /etc/nginx/sites-enabled/, then `nginx -t && systemctl reload nginx`.
#
# This config terminates connections from the public internet and forwards
# to the docker frontend container on 127.0.0.1:8080. The frontend container
# already serves the SPA and proxies /api to the backend container internally.
#
# When you add a domain, replace `_` with the domain name and run certbot
# to wire up Let's Encrypt:
#   sudo certbot --nginx -d radius.example.com

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 4m;

    # gzip the SPA bundle
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
